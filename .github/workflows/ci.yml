name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # FRONTEND
    - name: Install frontend
      run: |
        cd frontend
        npm install

    - name: Build frontend
      run: |
        cd frontend
        npm run build || true

    # BACKEND
    - name: Install backend
      run: |
        cd backend
        npm install

    - name: Run backend
      run: |
        cd backend
        node index.js &
        sleep 5

    # DOCKER
    - name: Build frontend Docker
      run: docker build -t frontend ./frontend || true

    - name: Build backend Docker
      run: docker build -t backend ./backend || true
